name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # ── Fat JAR (uber-jar) ──────────────────────────────────────────────────
  jar:
    name: Build fat JAR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build uber-jar (skip tests)
        run: ./gradlew build -x test --no-daemon

      - name: Rename artifact
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mv build/*-runner.jar "dbsync-${VERSION}.jar"

      - name: Upload uber-jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: dbsync-*.jar

  # ── Native: Linux x86_64 ────────────────────────────────────────────────
  native-linux-amd64:
    name: Native image (Linux x86_64)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM 21 (Community)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: graalvm-community
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-graalvm-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-graalvm-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build native image (Linux x86_64)
        run: |
          ./gradlew build -Dquarkus.native.enabled=true -Dquarkus.package.jar.enabled=false -x test --no-daemon
        env:
          GRAALVM_HOME: ${{ env.GRAALVM_HOME }}

      - name: Rename artifact
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mv build/*-runner "dbsync-${VERSION}-linux-amd64"
          chmod +x "dbsync-${VERSION}-linux-amd64"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-amd64
          path: dbsync-*-linux-amd64

  # ── Native: macOS ARM64 (Apple Silicon) ─────────────────────────────────
  native-macos-arm64:
    name: Native image (macOS ARM64)
    runs-on: macos-14
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM 21 (Community)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: graalvm-community
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-graalvm-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-graalvm-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build native image (macOS ARM64)
        run: |
          ./gradlew build -Dquarkus.native.enabled=true -Dquarkus.package.jar.enabled=false -x test --no-daemon
        env:
          GRAALVM_HOME: ${{ env.GRAALVM_HOME }}

      - name: Rename artifact
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mv build/*-runner "dbsync-${VERSION}-macos-arm64"
          chmod +x "dbsync-${VERSION}-macos-arm64"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-macos-arm64
          path: dbsync-*-macos-arm64

  # ── Native: macOS x86_64 (Intel) ────────────────────────────────────────
  native-macos-amd64:
    name: Native image (macOS x86_64)
    runs-on: macos-13
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM 21 (Community)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: graalvm-community
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-graalvm-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-graalvm-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build native image (macOS x86_64)
        run: |
          ./gradlew build -Dquarkus.native.enabled=true -Dquarkus.package.jar.enabled=false -x test --no-daemon
        env:
          GRAALVM_HOME: ${{ env.GRAALVM_HOME }}

      - name: Rename artifact
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mv build/*-runner "dbsync-${VERSION}-macos-amd64"
          chmod +x "dbsync-${VERSION}-macos-amd64"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-macos-amd64
          path: dbsync-*-macos-amd64

  # ── Native: Windows x86_64 ──────────────────────────────────────────────
  native-windows-amd64:
    name: Native image (Windows x86_64)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up GraalVM 21 (Community)
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: graalvm-community
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~\.gradle\caches
            ~\.gradle\wrapper
          key: gradle-${{ runner.os }}-graalvm-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-graalvm-

      - name: Build native image (Windows x86_64)
        shell: cmd
        run: gradlew.bat build -Dquarkus.native.enabled=true -Dquarkus.package.jar.enabled=false -x test --no-daemon

      - name: Rename artifact
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mv build/*-runner.exe "dbsync-${VERSION}-windows-amd64.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-windows-amd64
          path: dbsync-*-windows-amd64.exe

  # ── Create GitHub Release ───────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [jar, native-linux-amd64, native-macos-arm64, native-macos-amd64, native-windows-amd64]
    if: always() && needs.jar.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List artifacts
        run: find dist/ -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: dbsync-cli ${{ github.ref_name }}
          body: |
            ## dbsync-cli ${{ github.ref_name }}

            Database sync CLI tool — syncs schema and data from a source DB to a target DB using Debezium CDC.

            ### Supported sources
            - MySQL 5.7 / 8.0 / 8.4
            - MariaDB 10.x / 11.x
            - PostgreSQL 12–16
            - KingbaseES V9 (snapshot only)

            ### Supported targets
            - MySQL, MariaDB, PostgreSQL, KingbaseES

            ### Downloads
            | File | Description |
            |------|-------------|
            | `dbsync-*.jar` | Cross-platform fat JAR (requires Java 21+) |
            | `dbsync-*-linux-amd64` | Linux x86_64 native binary |
            | `dbsync-*-macos-arm64` | macOS Apple Silicon native binary |
            | `dbsync-*-macos-amd64` | macOS Intel native binary |
            | `dbsync-*-windows-amd64.exe` | Windows x86_64 native binary |

            ### Usage
            ```bash
            # Fat JAR
            java -jar dbsync-*.jar sync -c config.yaml

            # Native binary
            ./dbsync sync -c config.yaml
            ```
          files: dist/**/*
          fail_on_unmatched_files: false
