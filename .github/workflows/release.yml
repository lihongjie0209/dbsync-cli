name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  # ── Fat JAR (uber-jar) ──────────────────────────────────────────────────
  jar:
    name: Build fat JAR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build uber-jar (skip tests)
        run: ./gradlew build -x test --no-daemon

      - name: Rename artifact
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mv build/*-runner.jar "dbsync-${VERSION}.jar"

      - name: Upload uber-jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: dbsync-*.jar

  # ── Create GitHub Release ───────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [jar]
    runs-on: ubuntu-latest
    steps:
          retention-days: 1
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: List artifacts
        run: find dist/ -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: dbsync-cli ${{ github.ref_name }}
          body: |
            ## dbsync-cli ${{ github.ref_name }}

            Database sync CLI tool — syncs schema and data from a source DB to a target DB using Debezium CDC.

            ### Supported sources
            - MySQL 5.7 / 8.0 / 8.4
            - MariaDB 10.x / 11.x
            - PostgreSQL 12-16
            - KingbaseES V9 (snapshot only)

            ### Supported targets
            - MySQL, MariaDB, PostgreSQL, KingbaseES

            ### Usage
            ```bash
            java -jar dbsync-*.jar sync -c config.yaml
            ```
          files: dist/**/*
          fail_on_unmatched_files: false
