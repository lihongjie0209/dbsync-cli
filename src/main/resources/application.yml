quarkus:
  log:
    level: WARN
    category:
      "io.dbsync":
        level: INFO
      "io.debezium":
        level: INFO
  banner:
    enabled: false

# Disable Quarkus HTTP (CLI only)
"%prod":
  quarkus:
    http:
      host: localhost

# Native image: move JVM-centric libs (Jersey/Kafka Connect) to run-time init
# to avoid GraalVM static analysis failures on OSGi/classpath-scanning code.
# Also initialize JDBC drivers at run-time so their static blocks register
# with DriverManager at startup rather than during the native image build.
"%native":
  quarkus:
    native:
      additional-build-args: >-
        --initialize-at-run-time=org.glassfish.jersey,
        --initialize-at-run-time=org.apache.kafka.connect,
        --initialize-at-run-time=org.apache.kafka.common.network,
        --initialize-at-run-time=org.apache.kafka.common.security

